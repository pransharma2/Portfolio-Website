<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Prantap's Portfolio{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.png') }}">
  <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Bebas+Neue&family=Arsenal:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/p5.css') }}" />
</head>
<body class="page-{{ page }}">

  <!-- Animated background layer (pattern changes per page) -->
  <div class="p5-bg-layer">
    <div class="p5-bg-diamonds"></div>
    <div class="p5-bg-stripes"></div>
    <div class="p5-bg-halftone"></div>
    <div class="p5-bg-crosshatch"></div>
    <div class="p5-bg-vignette"></div>
  </div>

  <!-- Floating particles -->
  <div class="p5-particles" aria-hidden="true">
    <div class="p5-particle"></div>
    <div class="p5-particle"></div>
    <div class="p5-particle"></div>
    <div class="p5-particle"></div>
    <div class="p5-particle"></div>
    <div class="p5-particle"></div>
    <div class="p5-particle"></div>
    <div class="p5-particle"></div>
  </div>

  <!-- Corner decorations -->
  <div class="p5-corner-decor top-left" aria-hidden="true"></div>
  <div class="p5-corner-decor bottom-right" aria-hidden="true"></div>

  <!-- Page transition overlay -->
  <div class="p5-transition-overlay" id="p5-transition">
    <div class="p5-wipe p5-wipe-enter" id="p5-wipe"></div>
    <span class="p5-transition-text">Take Your Time</span>
  </div>

  <!-- Navigation -->
  <header class="p5-header">
    <nav class="p5-nav">
      <a class="p5-logo" href="{{ url_for('home') }}">
        <span>Phantom</span>&nbsp;<span style="color:var(--p5-yellow)">Dev</span>
      </a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu">&#9776;</button>
      <ul class="nav-links" id="nav-links">
        <li><a class="nav-link {% if page=='home' %}active{% endif %}" href="{{ url_for('home') }}">Home</a></li>
        <li><a class="nav-link {% if page=='about' %}active{% endif %}" href="{{ url_for('about') }}">About</a></li>
        <li><a class="nav-link {% if page=='projects' %}active{% endif %}" href="{{ url_for('projects') }}">Projects</a></li>
        <li><a class="nav-link {% if page=='contact' %}active{% endif %}" href="{{ url_for('contact') }}">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="p5-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="p5-footer">
    <div class="footer-inner">
      <span>&copy; 2025 Prantap &bull; Persona 5 Portfolio</span>
    </div>
  </footer>

  <!-- Sound toggle -->
  <button class="sound-toggle" id="sound-toggle" title="Toggle sound effects">&#9834;</button>

  <!-- Intro overlay -->
  <div id="p5-intro" class="p5-intro" hidden>
    <div class="intro-frame"></div>
    <img class="intro-joker" src="{{ url_for('static', filename='img/joker-cutin.png') }}" alt="">
    <div class="intro-swoosh cyan">
      <svg viewBox="0 0 108.1 47" preserveAspectRatio="none">
        <polygon fill="#23E0FF" points="0,20 108.1,0 95,47 0,35"></polygon>
      </svg>
    </div>
    <div class="intro-swoosh red">
      <svg viewBox="0 0 108.1 47" preserveAspectRatio="none">
        <polygon fill="#FF1E1E" points="10,0 108.1,12 108.1,47 0,30"></polygon>
      </svg>
    </div>
    <div class="intro-text"><span>Take Your Heart</span></div>
  </div>

  <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
</body>
</html>
