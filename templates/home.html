{% extends "base.html" %}
{% block title %}Home &mdash; Phantom Dev Portfolio{% endblock %}
{% block content %}
<section class="hero">
  <div class="hero-inner">
    <!-- Decorative floating stars -->
    <div class="p5-star" aria-hidden="true">&#9733;</div>
    <div class="p5-star" aria-hidden="true">&#10022;</div>
    <div class="p5-star" aria-hidden="true">&#9733;</div>
    <div class="p5-star" aria-hidden="true">&#10022;</div>
    <div class="p5-star" aria-hidden="true">&#9733;</div>

    <!-- Title card -->
    <div class="hero-title-card">
      <h1 class="glitch" data-text="Prantap's Portfolio">Prantap's Portfolio</h1>
      <div class="hero-sub">Take Your Heart &mdash; enter the Metaverse of my work.</div>
    </div>

    <!-- P5-style battle menu commands -->
    <nav class="p5-menu" aria-label="Main navigation">
      <a class="p5-menu-item" href="{{ url_for('about') }}" data-sound="select">
        <img class="menu-icon" src="{{ url_for('static', filename='img/about-me.png') }}" alt="">
        <span class="menu-label">About Me</span>
      </a>
      <a class="p5-menu-item" href="{{ url_for('projects') }}" data-sound="select">
        <img class="menu-icon" src="{{ url_for('static', filename='img/projects.png') }}" alt="">
        <span class="menu-label">Projects</span>
      </a>
      <a class="p5-menu-item" href="{{ url_for('contact') }}" data-sound="select">
        <img class="menu-icon" src="{{ url_for('static', filename='img/contact.png') }}" alt="">
        <span class="menu-label">Contact</span>
      </a>
    </nav>
  </div>

  <!-- Background character silhouette -->
  <img class="hero-character" src="{{ url_for('static', filename='img/joker-cutin.png') }}" alt="" aria-hidden="true">

  <!-- P5-style Weather & Date Widget (top-right corner) -->
  <div id="p5-weather-widget" class="p5-weather-widget">
    <div class="wgt-date-row">
      <!-- Month (stacked 3-layer sprites) -->
      <div class="wgt-month-top wgt-sprite wgt-month-sprite"></div>
      <div class="wgt-month-mid wgt-sprite wgt-month-sprite"></div>
      <div class="wgt-month-base wgt-sprite wgt-month-sprite"></div>
      <!-- Date tens -->
      <div class="wgt-date-tens-top wgt-sprite wgt-num-sprite"></div>
      <div class="wgt-date-tens-mid wgt-sprite wgt-num-sprite"></div>
      <div class="wgt-date-tens-base wgt-sprite wgt-num-sprite"></div>
      <!-- Date ones -->
      <div class="wgt-date-ones-top wgt-sprite wgt-num-sprite"></div>
      <div class="wgt-date-ones-mid wgt-sprite wgt-num-sprite"></div>
      <div class="wgt-date-ones-base wgt-sprite wgt-num-sprite"></div>
    </div>
    <div class="wgt-bottom-row">
      <!-- Weekday sprite -->
      <div class="wgt-weekday"></div>
      <!-- Weather icon -->
      <div class="wgt-weather-card"></div>
      <div class="wgt-weather-sprite"></div>
    </div>
    <!-- Time & temp (text-based for simplicity) -->
    <div class="wgt-info-row">
      <span class="wgt-time">00:00AM</span>
      <span class="wgt-temp">--&deg;C</span>
    </div>
  </div>
</section>
{% endblock %}
